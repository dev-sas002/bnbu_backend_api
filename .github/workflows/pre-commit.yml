name: Code Quality Checks

on: [push]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit black

      - name: Fetch full history
        run: git fetch --unshallow

      - name: Run black only on modified Python files
        run: |
          DIFF_BASE=$(git merge-base HEAD refs/remotes/origin/master)
          MODIFIED_FILES=$(git diff --name-only $DIFF_BASE HEAD -- '*.py')
          if [ -n "$MODIFIED_FILES" ]; then
            echo "Modified files: $MODIFIED_FILES"
            echo $MODIFIED_FILES | xargs black
          else
            echo "No modified Python files to format."
          fi
