name: Code Quality Checks

on: [push]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Fetch full history
        run: git fetch --unshallow

      - name: Run pre-commit on modified files
        run: |
          DIFF_BASE=$(git merge-base HEAD refs/remotes/origin/master)
          MODIFIED_FILES=$(git diff --name-only $DIFF_BASE HEAD)
          if [ -z "$MODIFIED_FILES" ]; then
            echo "No changes detected. Skipping pre-commit."
            exit 0
          fi
          echo $MODIFIED_FILES | xargs pre-commit run --files
